apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: prod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: registry.io/app/api:v1
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "1"
              memory: "2Gi"
          env:
            - name: DATABASE_URL
              value: postgres://db/prod
          envFrom:
            - configMapRef:
                name: app-config
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            timeoutSeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /live
              port: 8080
            timeoutSeconds: 5
            periodSeconds: 10
            failureThreshold: 3
      imagePullSecrets: []
